services:
  - type: web
    name: siniscalco
    runtime: docker
    plan: free
    healthCheckPath: /
    disk:
      name: siniscalco-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /app/data/app.db
      - key: YAHOO_FINANCE_ENABLED
        value: "true"
