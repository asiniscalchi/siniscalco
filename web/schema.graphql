type AccountDetail {
	id: Int!
	name: String!
	accountType: AccountType!
	baseCurrency: String!
	summaryStatus: SummaryStatus!
	cashTotalAmount: String
	assetTotalAmount: String
	totalAmount: String
	totalCurrency: String
	createdAt: String!
	balances: [Balance!]!
}

input AccountInput {
	name: String!
	accountType: AccountType!
	baseCurrency: String!
}

type AccountSummary {
	id: Int!
	name: String!
	accountType: AccountType!
	baseCurrency: String!
	summaryStatus: SummaryStatus!
	cashTotalAmount: String
	assetTotalAmount: String
	totalAmount: String
	totalCurrency: String
}

enum AccountType {
	BANK
	BROKER
	CRYPTO
}

type Asset {
	id: Int!
	symbol: String!
	name: String!
	assetType: AssetType!
	quoteSymbol: String
	isin: String
	quoteSourceSymbol: String
	quoteSourceProvider: String
	quoteSourceLastSuccessAt: String
	currentPrice: String
	currentPriceCurrency: String
	currentPriceAsOf: String
	totalQuantity: String
	avgCostBasis: String
	avgCostBasisCurrency: String
	previousClose: String
	previousCloseCurrency: String
	convertedTotalValue: String
	convertedTotalValueCurrency: String
	createdAt: String!
	updatedAt: String!
}

input AssetInput {
	symbol: String!
	name: String!
	assetType: AssetType!
	quoteSymbol: String
	isin: String
}

type AssetPosition {
	accountId: Int!
	assetId: Int!
	quantity: String!
}

enum AssetType {
	STOCK
	ETF
	BOND
	CRYPTO
	CASH_EQUIVALENT
	OTHER
}

type Balance {
	currency: String!
	amount: String!
	updatedAt: String!
}

type CashMovement {
	id: Int!
	accountId: Int!
	currency: String!
	amount: String!
	date: String!
	notes: String
	createdAt: String!
}

input CashMovementInput {
	currency: String!
	amount: String!
	date: String!
	notes: String
}

type FxRateSummary {
	targetCurrency: String!
	rates: [FxRateSummaryItem!]!
	lastUpdated: String
	refreshStatus: RefreshAvailability!
	refreshError: String
}

type FxRateSummaryItem {
	currency: String!
	rate: String!
}

type MutationRoot {
	createAccount(input: AccountInput!): AccountDetail!
	updateAccount(id: Int!, input: AccountInput!): AccountDetail!
	deleteAccount(id: Int!): Int!
	createCashMovement(accountId: Int!, input: CashMovementInput!): CashMovement!
	createAsset(input: AssetInput!): Asset!
	updateAsset(id: Int!, input: AssetInput!): Asset!
	deleteAsset(id: Int!): Int!
	createTransaction(input: TransactionInput!): Transaction!
	updateTransaction(id: Int!, input: TransactionInput!): Transaction!
	deleteTransaction(id: Int!): Int!
	createTransfer(input: TransferInput!): Transfer!
	deleteTransfer(id: Int!): Int!
}

type PortfolioAccountTotal {
	id: Int!
	name: String!
	accountType: AccountType!
	summaryStatus: SummaryStatus!
	cashTotalAmount: String
	assetTotalAmount: String
	totalAmount: String
	totalCurrency: String!
}

type PortfolioAllocationSlice {
	label: String!
	amount: String!
}

type PortfolioCashByCurrency {
	currency: String!
	amount: String!
	convertedAmount: String
}

type PortfolioHolding {
	assetId: Int
	symbol: String!
	name: String!
	value: String!
}

type PortfolioSnapshot {
	totalValue: String!
	currency: String!
	recordedAt: String!
}

type PortfolioSummary {
	displayCurrency: String!
	totalValueStatus: SummaryStatus!
	totalValueAmount: String
	accountTotals: [PortfolioAccountTotal!]!
	cashByCurrency: [PortfolioCashByCurrency!]!
	fxLastUpdated: String
	fxRefreshStatus: RefreshAvailability!
	fxRefreshError: String
	allocationTotals: [PortfolioAllocationSlice!]!
	allocationIsPartial: Boolean!
	holdings: [PortfolioHolding!]!
	holdingsIsPartial: Boolean!
}

type QueryRoot {
	portfolioHistory: [PortfolioSnapshot!]!
	portfolio: PortfolioSummary!
	accounts: [AccountSummary!]!
	account(id: Int!): AccountDetail!
	accountPositions(accountId: Int!): [AssetPosition!]!
	assets: [Asset!]!
	asset(id: Int!): Asset!
	transactions(accountId: Int): [Transaction!]!
	transaction(id: Int!): Transaction!
	cashMovements(accountId: Int): [CashMovement!]!
	transfers(accountId: Int): [Transfer!]!
	currencies: [String!]!
	fxRates: FxRateSummary!
}

enum RefreshAvailability {
	AVAILABLE
	UNAVAILABLE
}

enum SummaryStatus {
	OK
	CONVERSION_UNAVAILABLE
}

type Transaction {
	id: Int!
	accountId: Int!
	assetId: Int!
	transactionType: TransactionType!
	tradeDate: String!
	quantity: String!
	unitPrice: String!
	currencyCode: String!
	notes: String
	createdAt: String!
	updatedAt: String!
}

input TransactionInput {
	accountId: Int!
	assetId: Int!
	transactionType: TransactionType!
	tradeDate: String!
	quantity: String!
	unitPrice: String!
	currencyCode: String!
	notes: String
}

enum TransactionType {
	BUY
	SELL
}

type Transfer {
	id: Int!
	fromAccountId: Int!
	toAccountId: Int!
	fromCurrency: String!
	fromAmount: String!
	toCurrency: String!
	toAmount: String!
	transferDate: String!
	notes: String
	createdAt: String!
}

input TransferInput {
	fromAccountId: Int!
	toAccountId: Int!
	fromCurrency: String!
	fromAmount: String!
	toCurrency: String!
	toAmount: String!
	transferDate: String!
	notes: String
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: QueryRoot
	mutation: MutationRoot
}
