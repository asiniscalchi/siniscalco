<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="outer" x1="20%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#C8820A"/>
    </linearGradient>
    <linearGradient id="inner" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#D4970C"/>
    </linearGradient>
  </defs>
  <!-- Coin depth shadow -->
  <circle cx="24" cy="26" r="21" fill="#8B5E00" opacity="0.6"/>
  <!-- Coin face -->
  <circle cx="24" cy="24" r="21" fill="url(#outer)"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="17" fill="url(#inner)"/>
  <!-- Dollar sign vertical bar -->
  <line x1="24" y1="9" x2="24" y2="39" stroke="#7A5000" stroke-width="3" stroke-linecap="round"/>
  <!-- Dollar sign S-curve -->
  <path d="M 30 16 C 30 11 18 11 18 18 C 18 24 30 24 30 30 C 30 37 18 37 18 32"
        fill="none" stroke="#7A5000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
