name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --locked -- -D warnings
      - name: Run tests
        run: cargo test --locked

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
      - name: Run lint
        run: npm run lint -- --max-warnings 0
      - name: Run typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build

  codegen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - uses: actions/setup-node@v5
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Regenerate schema and types
        run: |
          cargo run --manifest-path backend/Cargo.toml --bin schema-export 2>/dev/null > web/schema.graphql
          cd web && npm run codegen
      - name: Check for uncommitted changes
        run: git diff --exit-code web/schema.graphql web/src/gql/types.ts

  docker-single-container:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - codegen
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Docker metadata
        id: single-container-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/siniscalco
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
      - name: Build single-container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.single-container-meta.outputs.tags }}
          labels: ${{ steps.single-container-meta.outputs.labels }}

  docker-backend:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - codegen
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Docker metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/siniscalco-backend
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

  docker-web:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - codegen
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Docker metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/siniscalco-web
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}
