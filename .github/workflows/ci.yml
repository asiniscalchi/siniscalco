name: CI

on:
  push:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Check formatting
        run: cargo fmt --check
      - name: Run tests
        run: cargo test --locked

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build

  codegen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - uses: actions/setup-node@v5
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Regenerate schema and types
        run: |
          cargo run --manifest-path backend/Cargo.toml --bin schema-export 2>/dev/null > web/schema.graphql
          cd web && npm run codegen
      - name: Check for uncommitted changes
        run: git diff --exit-code web/schema.graphql web/src/gql/types.ts

  docker-backend:
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - codegen
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t siniscalco-backend ./backend

  docker-web:
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - codegen
    steps:
      - uses: actions/checkout@v4
      - name: Build web image
        run: docker build --build-arg VITE_API_BASE_URL=http://127.0.0.1:3000 -t siniscalco-web ./web
