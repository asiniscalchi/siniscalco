services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/${GHCR_OWNER:-asiniscalchi}/siniscalco-backend:${APP_TAG:-latest}}
    env_file:
      - ./backend/.env.example
    ports:
      - "3000:3000"
    volumes:
      - backend_data:/app/data

  web:
    image: ${WEB_IMAGE:-ghcr.io/${GHCR_OWNER:-asiniscalchi}/siniscalco-web:${APP_TAG:-latest}}
    depends_on:
      - backend
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:3000}
    ports:
      - "8080:80"

volumes:
  backend_data:
