services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/asiniscalchi/siniscalco-backend:${APP_TAG:-latest}}
    env_file:
      - ./backend/.env.example
    ports:
      - "3000:3000"
    volumes:
      - backend_data:/app/data

  web:
    image: ${WEB_IMAGE:-ghcr.io/asiniscalchi/siniscalco-web:${APP_TAG:-latest}}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:
